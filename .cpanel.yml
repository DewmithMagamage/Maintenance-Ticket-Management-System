---
# cPanel Git Deployment (repo root). Committed copy must exist on the branch you deploy.
# Docs: https://docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/
#
# Clean working tree: commit and push from your machine; do not leave local edits on the server clone.

deployment:
  tasks:
    # Confirms deployment runs from the repository root (where this file lives).
    - /bin/test -f package.json
    - /bin/test -f server/package.json
    # Add your own lines below ONLY after confirming paths with your host, e.g. copy built files:
    # - export DEPLOYPATH=/home/YOURUSER/public_html/
    # - /bin/test -d server/public && /bin/cp -R server/public/. "$DEPLOYPATH"
